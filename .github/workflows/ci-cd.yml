name: CI/CD - Automated Quality Checks

on:
  push:
    branches: [main, staging, testing, develop]
  pull_request:
    branches: [main, staging, testing, develop]

# Security: Explicitly set minimal permissions
permissions:
  contents: read

jobs:
  # ============================================================================
  # JOB 1: Code Quality & Linting
  # ============================================================================
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for console.log in production code
        run: |
          echo "Checking for console.log statements..."
          if grep -r "console\.log\|console\.debug" App.tsx hooks/ utils/ types/ i18n/ --exclude-dir=node_modules --exclude-dir=.git; then
            echo "❌ ERROR: Found console.log/debug in production code!"
            exit 1
          else
            echo "✅ No console.log found"
          fi

      - name: Check for Web APIs without Platform check
        run: |
          echo "Checking for unsafe Web API usage..."
          # Check for window.* without Platform.OS check (exclude utils/platform.ts as it's the platform wrapper)
          if grep -r "window\." App.tsx hooks/ utils/ --exclude-dir=node_modules --exclude=platform.ts | grep -v "Platform.OS === 'web'" | grep -v "// platform-safe"; then
            echo "❌ ERROR: Found window.* without Platform.OS check!"
            echo "Add 'Platform.OS === web' check or // platform-safe comment"
            exit 1
          fi

          # Check for localStorage without Platform.OS check (exclude utils/platform.ts as it's the platform wrapper)
          if grep -r "localStorage\." App.tsx hooks/ utils/ --exclude-dir=node_modules --exclude=platform.ts | grep -v "Platform.OS === 'web'" | grep -v "// platform-safe"; then
            echo "❌ ERROR: Found localStorage without Platform.OS check!"
            echo "Use AsyncStorage for mobile or add Platform.OS check"
            exit 1
          fi

          echo "✅ All Web APIs are platform-safe"

      - name: Check for direct AsyncStorage imports
        run: |
          echo "Checking AsyncStorage usage..."
          # Ensure AsyncStorage is used for mobile, not localStorage
          if grep -r "@react-native-async-storage/async-storage" App.tsx --exclude-dir=node_modules; then
            echo "✅ AsyncStorage is properly used"
          fi

      - name: TypeScript Type Check
        run: npx tsc --noEmit || true

  # ============================================================================
  # JOB 2: Cross-Platform Build Tests
  # ============================================================================
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        run: npm run build:web

      - name: Check bundle size
        run: |
          if [ -d "dist" ]; then
            SIZE=$(du -sh dist | cut -f1)
            echo "📦 Bundle size: $SIZE"
            # Optional: Add size threshold check
          fi

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 7

  # Note: Android builds are handled via EAS Build (cloud-based)
  # Local Android builds are not supported as /android directory is not tracked
  # See: https://docs.expo.dev/build/introduction/

  # ============================================================================
  # JOB 3: Platform Compatibility Checks
  # ============================================================================
  platform-checks:
    name: 🔧 Platform Compatibility
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          echo "Checking version numbers across files..."

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          APP_JSON_VERSION=$(node -p "require('./app.json').expo.version")
          APP_VERSION=$(grep "APP_VERSION = " utils/constants.ts | sed -E "s/.*'(.*)'.*/\1/")

          echo "package.json: $PACKAGE_VERSION"
          echo "app.json: $APP_JSON_VERSION"
          echo "utils/constants.ts: $APP_VERSION"

          if [ "$PACKAGE_VERSION" != "$APP_JSON_VERSION" ] || [ "$PACKAGE_VERSION" != "$APP_VERSION" ]; then
            echo "❌ ERROR: Version mismatch!"
            echo "All versions must be identical."
            exit 1
          fi

          echo "✅ All versions are consistent"

      - name: Check Android versionCode exists
        run: |
          echo "Checking Android versionCode in app.json..."
          APP_JSON_VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode")

          echo "app.json versionCode: $APP_JSON_VERSION_CODE"

          if [ -z "$APP_JSON_VERSION_CODE" ] || [ "$APP_JSON_VERSION_CODE" = "undefined" ]; then
            echo "❌ ERROR: Android versionCode not found in app.json!"
            exit 1
          fi

          echo "✅ Android versionCode is defined"

      - name: Validate UX Guidelines compliance
        run: |
          echo "Checking UX Guidelines compliance..."

          # Check for three-dot settings icon (not gear emoji)
          if grep -q "⚙" App.tsx; then
            echo "❌ ERROR: Found gear emoji! Use three vertical dots (⋮) instead"
            exit 1
          fi

          # Check for Theme toggle (System/Dark, not Light/Dark/System)
          if grep -q "'light'" App.tsx; then
            echo "⚠️  WARNING: Light theme found. Consider System/Dark toggle only"
          fi

          echo "✅ Basic UX guidelines check passed"

  # ============================================================================
  # JOB 4: Security & Dependencies
  # ============================================================================
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

      - name: Check for sensitive data
        run: |
          echo "Checking for sensitive data..."

          # Check for potential secrets
          if grep -ri "password\s*=\|api_key\s*=\|secret\s*=" . --exclude-dir=node_modules --exclude-dir=.git --exclude="*.md" | grep -v "storePassword = "; then
            echo "⚠️  WARNING: Potential sensitive data found!"
          fi

          echo "✅ No obvious secrets found"

      - name: Check for account-specific identifiers (Issue #150)
        run: |
          echo "Checking for account-specific identifiers..."
          FOUND=0

          # app.json: EAS projectId must not be committed
          if grep -q '"projectId"' app.json 2>/dev/null; then
            echo "❌ app.json enthält 'projectId' (EAS Account-Verknüpfung)"
            echo "   → Lokal halten, zur Build-Zeit per Umgebungsvariable injizieren"
            FOUND=1
          fi

          # app.json: owner field must not be committed
          if grep -q '"owner"\s*:' app.json 2>/dev/null; then
            echo "❌ app.json enthält 'owner' (persönlicher Expo-Account)"
            echo "   → Lokal halten, zur Build-Zeit per Umgebungsvariable injizieren"
            FOUND=1
          fi

          # app.json: personal package names must not be committed
          if grep -qE '"(package|bundleIdentifier)"\s*:\s*"com\.sven' app.json 2>/dev/null; then
            echo "❌ app.json enthält persönliche Store-Package-Namen (com.sven...)"
            echo "   → Lokal halten, nicht im öffentlichen Repo"
            FOUND=1
          fi

          # Workflow files: hardcoded SHA1 signing fingerprint (full 20-byte pattern, exclude secret refs)
          if grep -riE "([0-9A-Fa-f]{2}:){19}[0-9A-Fa-f]{2}" .github/workflows/ 2>/dev/null | grep -qvE '\$\{\{|\$[A-Z_]+'; then
            echo "❌ Hardcoded SHA1-Signing-Fingerabdruck in Workflow-Datei gefunden"
            echo "   → Als GitHub Secret auslagern (ANDROID_KEY_SHA1)"
            FOUND=1
          fi

          # Internal docs must not be in the repo
          for internal_doc in "docs/ANDROID_BUILD.md" "docs/RELEASE_CHECKLIST.md" "scripts/setup-twa-step1.sh"; do
            if [ -f "$internal_doc" ]; then
              echo "❌ Interne Datei im Repo: $internal_doc"
              echo "   → Lokal halten, aus Repo entfernen und in .gitignore eintragen"
              FOUND=1
            fi
          done

          # .claude/ directory must not be in the repo
          if [ -d ".claude" ]; then
            echo "❌ .claude/ Verzeichnis ist im Repo (AI-Tool-Konfiguration)"
            echo "   → Lokal halten, in .gitignore eintragen (Issue #150)"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "Bereinigung erforderlich – siehe Issue #150:"
            echo "https://github.com/S540d/1x1_Trainer/issues/150"
            exit 1
          fi

          echo "✅ Keine account-spezifischen Identifier gefunden"

  # ============================================================================
  # JOB 5: Docs Privacy & Keystore Checks (Issue #152)
  # ============================================================================
  docs-privacy:
    name: 🔐 Docs Privacy Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check .gitignore covers docs/private/
        run: |
          if ! grep -q "docs/private/" .gitignore; then
            echo "❌ docs/private/ is not in .gitignore!"; exit 1
          fi
          echo "✅ docs/private/ is gitignored"

      - name: Check no private docs are committed
        run: |
          PRIVATE=$(git ls-files docs/private/ 2>/dev/null)
          if [ -n "$PRIVATE" ]; then
            echo "❌ Private docs found in repo:"; echo "$PRIVATE"; exit 1
          fi
          echo "✅ No private docs committed"

      - name: Check known sensitive filenames not in repo
        run: |
          for f in DEPLOYMENT_GUIDE.md PLAY_STORE_METADATA.md PLAY_STORE_METADATA_EN.md STORE_ASSETS_TODO.md BILDERPOOL.md IMAGE_GUIDELINES.md; do
            if git ls-files | grep -q "$f"; then
              echo "❌ Sensitive file in repo: $f"; exit 1
            fi
          done
          echo "✅ No sensitive filenames found"

  keystore-secrets:
    name: 🔑 Keystore & Credential Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check no keystore files are committed
        run: |
          FOUND=$(git ls-files | grep -E "\.(keystore|jks)$" || true)
          if [ -n "$FOUND" ]; then
            echo "❌ Keystore committed: $FOUND"; exit 1
          fi
          echo "✅ No keystore files found"

      - name: Check .gitignore covers keystore patterns
        run: |
          if ! grep -q "\.jks" .gitignore; then
            echo "❌ .gitignore missing *.jks"; exit 1
          fi
          echo "✅ Keystore patterns are gitignored"

      - name: Scan for hardcoded keystore passwords
        run: |
          if grep -rEi "keystorePassword\s*=\s*['\"][^'\"]+['\"]|keyPassword\s*=\s*['\"][^'\"]+['\"]|storePassword\s*=\s*['\"][^'\"]+['\"]" . \
              --include="*.gradle" --include="*.gradle.kts" --include="*.yml" --include="*.yaml" 2>/dev/null \
              | grep -qv "\${{"; then
            echo "❌ Hardcoded keystore password found! Use GitHub Secrets instead."; exit 1
          fi
          echo "✅ No hardcoded keystore passwords"

  # ============================================================================
  # JOB 6: Release Readiness Report
  # ============================================================================
  release-checklist:
    name: 📋 Release Readiness Report
    runs-on: ubuntu-latest
    needs: [code-quality, build-web, platform-checks]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Report
        run: |
          echo "# 🚀 Release Readiness Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Automated Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code Quality & Linting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Web Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Platform Compatibility" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version Consistency" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Android builds are handled via EAS Build (https://expo.dev/builds)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📝 Manual Checks Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Before deploying, manually verify:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test app on physical Android device" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test all features in web browser" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Dark mode works correctly" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Settings persist correctly" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Release notes written" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] CHANGELOG.md updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

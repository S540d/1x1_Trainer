name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (production = AAB, preview = APK)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
      bump:
        description: 'Version bump type ⚠️ Default is patch – set none only if already bumped!'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none

# Minimal permissions - only write for committing version bump
permissions:
  contents: write

jobs:
  build:
    name: 🤖 Android Build (${{ inputs.profile }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # Optional: Version bump before build
      # -----------------------------------------------------------------------
      - name: Bump version
        if: inputs.bump != 'none'
        run: |
          chmod +x scripts/bump-version.sh
          ./scripts/bump-version.sh ${{ inputs.bump }}

      - name: Commit version bump
        if: inputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          git add package.json app.json utils/constants.ts package-lock.json
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git push

      # -----------------------------------------------------------------------
      # Expo Prebuild → generates /android directory
      # -----------------------------------------------------------------------
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # -----------------------------------------------------------------------
      # Validate and Decode Keystore from GitHub Secret
      # -----------------------------------------------------------------------
      - name: Decode Keystore
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "❌ ERROR: ANDROID_KEYSTORE_BASE64 secret is not set."
            echo "Please add the keystore as a Base64-encoded GitHub Secret."
            echo "See docs/ANDROID_BUILD.md for setup instructions."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          echo "ANDROID_KEYSTORE_PATH=$PWD/android/app/release.keystore" >> $GITHUB_ENV
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      # -----------------------------------------------------------------------
      # Inject signing config into build.gradle (expo prebuild doesn't add it)
      # -----------------------------------------------------------------------
      - name: Configure Gradle Signing
        run: |
          GRADLE_FILE="android/app/build.gradle"
          if ! grep -q "ANDROID_KEYSTORE_PATH" "$GRADLE_FILE"; then
            echo "📝 Injecting signingConfigs into build.gradle..."
            sed -i '/android {/a\
              signingConfigs {\
                  release {\
                      if (project.hasProperty('\''ANDROID_KEYSTORE_PATH'\'')) {\
                          storeFile file(project.property('\''ANDROID_KEYSTORE_PATH'\''))\
                          keyAlias project.property('\''ANDROID_KEY_ALIAS'\'')\
                          keyPassword project.property('\''ANDROID_KEY_PASSWORD'\'')\
                          storePassword project.property('\''ANDROID_STORE_PASSWORD'\'')\
                      }\
                  }\
              }' "$GRADLE_FILE"
            sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' "$GRADLE_FILE"
            echo "✅ Signing config injected"
          else
            echo "✅ Signing config already present"
          fi

      - name: Verify Keystore Fingerprint
        run: |
          EXPECTED_SHA1="3F:1F:1E:16:56:BB:01:36:40:50:76:E8:44:73:9D:01:A3:B8:D4:78"
          ACTUAL_SHA1=$(keytool -list -v -keystore android/app/release.keystore -storepass "$STORE_PASSWORD" 2>/dev/null | grep "SHA1:" | head -1 | sed 's/.*SHA1: //')
          echo "Expected SHA1: $EXPECTED_SHA1"
          echo "Actual SHA1:   $ACTUAL_SHA1"
          if [ "$ACTUAL_SHA1" != "$EXPECTED_SHA1" ]; then
            echo "❌ ERROR: Keystore SHA1 fingerprint does NOT match!"
            echo "The ANDROID_KEYSTORE_BASE64 secret contains the wrong keystore."
            echo "Please update the secret with the correct keystore."
            exit 1
          fi
          echo "✅ Keystore fingerprint verified"
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      # -----------------------------------------------------------------------
      # Build AAB (production) or APK (preview)
      # Secrets passed via ORG_GRADLE_PROJECT_ env vars (not visible in process list)
      # -----------------------------------------------------------------------
      - name: Build AAB
        if: inputs.profile == 'production'
        run: |
          cd android
          ./gradlew bundleRelease
        env:
          ORG_GRADLE_PROJECT_ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Build APK
        if: inputs.profile == 'preview'
        run: |
          cd android
          ./gradlew assembleRelease
        env:
          ORG_GRADLE_PROJECT_ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      # -----------------------------------------------------------------------
      # Upload Artifact
      # -----------------------------------------------------------------------
      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload AAB
        if: inputs.profile == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: 1x1-trainer-v${{ steps.version.outputs.version }}-release.aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Upload APK
        if: inputs.profile == 'preview'
        uses: actions/upload-artifact@v4
        with:
          name: 1x1-trainer-v${{ steps.version.outputs.version }}-preview.apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          VERSION_CODE=$(node -e "process.stdout.write(String(require('./app.json').expo.android.versionCode))")
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Profile** | ${{ inputs.profile }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | $VERSION (versionCode $VERSION_CODE) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the artifact above to install or submit to Play Store." >> $GITHUB_STEP_SUMMARY
